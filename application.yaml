apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ds-kjyeops/argocd-apps.git
    targetRevision: main
    path: ./nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true