apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: nginx
        image: harbor.clab.ai/oss/nginx:1.27.2
        ports:
        - containerPort: 80